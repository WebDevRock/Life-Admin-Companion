kind = "web"
previewPath = "/"
title = "Life Admin Companion"
version = "1.0.0"
id = "artifacts/life-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21378

[services.development]
run = "pnpm --filter @workspace/life-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/life-admin", "run", "build" ]
publicDir = "artifacts/life-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21378"
BASE_PATH = "/"
